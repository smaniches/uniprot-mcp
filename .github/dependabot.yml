version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      # Pin the run to a predictable local hour. With no time/timezone,
      # Dependabot fires at its default slot in UTC (~04:40 UTC), which lands
      # in the middle of the night for the maintainer. NOTE: adjust `timezone`
      # to your actual IANA zone if America/New_York is not yours.
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    # Dependabot manages the DIRECT deps declared in pyproject.toml only.
    #
    # constraints/dev.lock is a DERIVED uv lock. Dependabot's pip parser would
    # treat every pinned line in it as a top-level requirement (the `# via`
    # annotations are comments, not a dependency graph it understands), so it
    # cannot distinguish transitive pins (msgpack, pydantic-core, ...) from real
    # direct deps. `allow: dependency-type: direct` therefore does NOT exclude
    # them — confirmed in production: closed PR #109 still bumped 6 transitive
    # pins and failed the "Dev lock in sync" gate. Two things keep the lock out
    # of Dependabot's reach instead:
    #   1. it is named *.lock (not *.txt / *.in), so the pip file fetcher does
    #      not parse it as a requirements file at all; and
    #   2. exclude-paths skips the constraints/ directory before manifest
    #      parsing, as a second, explicit layer.
    # Transitive pins advance via .github/workflows/dev-lock-maintenance.yml.
    # Transitive CVEs are still patched by Dependabot *security* updates, which
    # act on vulnerable lock entries independently of this version-update config.
    exclude-paths:
      - "constraints/**"
    groups:
      runtime:
        patterns: ["httpx", "mcp"]
      dev:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "hypothesis"
          - "respx"
          - "syrupy"
          - "bandit"
          - "pip-audit"
          - "pre-commit"
          - "interrogate"
      docs:
        patterns: ["mkdocs*"]
      # Catch-all so a direct dep not matched above still lands in one PR
      # rather than a standalone one.
      other:
        patterns: ["*"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    groups:
      # Batch all action bumps into a single weekly PR instead of one each
      # (previously actions/checkout, release-drafter and action-gh-release
      # arrived as three separate PRs in the same run).
      actions:
        patterns: ["*"]
    ignore:
      # release-drafter v7.x has a regression on the pull_request trigger
      # path: it sends `targetCommitish: refs/pull/N/merge` to GitHub's
      # update-release API, which is rejected with "Validation Failed:
      # target_commitish invalid". Tracked upstream at
      # https://github.com/release-drafter/release-drafter/issues/1125
      # (open since 2022-04-21). We are on v7.2.0 with the workflow's
      # `pull_request` trigger removed (commit f98f08cc) — the
      # `push:branches:[main]` path is the only one we ship from, and
      # it works correctly. Block further v8+ majors until a fix lands
      # so we don't get re-bitten on a routine bump; minors and patches
      # of v7 are still allowed.
      - dependency-name: "release-drafter/release-drafter"
        update-types: ["version-update:semver-major"]
