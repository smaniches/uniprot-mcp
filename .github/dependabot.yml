version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      # Pin the run to a predictable local hour. With no time/timezone,
      # Dependabot fires at its default slot in UTC (~04:40 UTC), which lands
      # in the middle of the night for the maintainer. NOTE: adjust `timezone`
      # to your actual IANA zone if America/New_York is not yours — it was
      # chosen to match the observed UTC-4 offset of the prior run.
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    # Manage DIRECT dependencies only — the ones declared in pyproject.toml.
    # constraints/dev.txt is a DERIVED uv lock; its transitive pins (msgpack,
    # pydantic-core, pydantic-settings, cachecontrol, ...) must advance by
    # regenerating the lock, not by standalone Dependabot line-edits. Those
    # edits don't run `uv pip compile`, so a transitive bump either cascades
    # and fails the "Dev lock in sync" gate (see closed PR #104, where the
    # recompile reverted a solo pydantic-core bump) or churns as one-off PRs.
    # Transitive CVEs are NOT lost: Dependabot *security* updates patch
    # vulnerable lock entries regardless of this allow filter.
    allow:
      - dependency-type: "direct"
    groups:
      runtime:
        patterns: ["httpx", "mcp"]
      dev:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy"
          - "hypothesis"
          - "respx"
          - "syrupy"
          - "bandit"
          - "pip-audit"
          - "pre-commit"
          - "interrogate"
      docs:
        patterns: ["mkdocs*"]
      # Fallback batcher. With `allow: direct` the transitive lock pins should
      # already be excluded, leaving this empty. If a future run still surfaces
      # an indirect dep, this keeps it to a single PR instead of one-per-package.
      other:
        patterns: ["*"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    groups:
      # Batch all action bumps into a single weekly PR instead of one each
      # (previously actions/checkout, release-drafter and action-gh-release
      # arrived as three separate PRs in the same run).
      actions:
        patterns: ["*"]
    ignore:
      # release-drafter v7.x has a regression on the pull_request trigger
      # path: it sends `targetCommitish: refs/pull/N/merge` to GitHub's
      # update-release API, which is rejected with "Validation Failed:
      # target_commitish invalid". Tracked upstream at
      # https://github.com/release-drafter/release-drafter/issues/1125
      # (open since 2022-04-21). We are on v7.2.0 with the workflow's
      # `pull_request` trigger removed (commit f98f08cc) — the
      # `push:branches:[main]` path is the only one we ship from, and
      # it works correctly. Block further v8+ majors until a fix lands
      # so we don't get re-bitten on a routine bump; minors and patches
      # of v7 are still allowed.
      - dependency-name: "release-drafter/release-drafter"
        update-types: ["version-update:semver-major"]
