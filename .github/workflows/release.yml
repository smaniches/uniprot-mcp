name: Release

on:
  push:
    tags:
      - "v[0-9]*"
  # Programmatic / manual trigger. release-please.yml dispatches this after it
  # creates a release, because a GITHUB_TOKEN-authored release event does not
  # fan out to other workflows. The old `push: tags: v[0-9]*` path above stays
  # as a working fallback for a manually pushed tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build and publish (e.g. v1.2.0)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # SLSA provenance OIDC
      attestations: write   # actions/attest-build-provenance + attest-sbom
    outputs:
      sbom: ${{ steps.sbom.outputs.path }}
    steps:
      # Guard against an accidental manual dispatch with a blank tag. The
      # release-please dispatch ALWAYS passes --field tag, so this only
      # fires on manual misuse. Without it, a blank tag would fall back to
      # building github.ref (the branch) and then call action-gh-release
      # with an empty tag_name. Fail fast before anything is built or
      # published. The push:tags fallback (event_name == 'push') is
      # unaffected — it never reads inputs.tag.
      - name: Require a tag on manual dispatch
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.tag == '' }}
        run: |
          echo "::error::workflow_dispatch requires a non-empty 'tag' input (e.g. v1.2.0)."
          echo "Push a tag (refs/tags/v*) for the fallback path, or supply the tag input."
          exit 1
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          # Build the exact released tag when dispatched by release-please, so
          # the wheel reflects the released commit rather than main HEAD. On
          # the push-tag fallback, inputs.tag is empty and github.ref is the
          # tag ref, so the same checkout is correct either way.
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip build
          pip install cyclonedx-bom
      - name: Build sdist + wheel
        run: python -m build
      - name: Generate CycloneDX SBOM
        id: sbom
        run: |
          cyclonedx-py requirements -o sbom.cdx.json <(pip freeze)
          echo "path=sbom.cdx.json" >> "$GITHUB_OUTPUT"
      - name: SLSA provenance attestation (dist)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-path: "dist/*"
      - name: SBOM attestation (CycloneDX)
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e  # v4.1.0
        with:
          subject-path: "dist/*"
          sbom-path: "sbom.cdx.json"
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: release-artifacts
          path: |
            dist/*
            sbom.cdx.json

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # PyPI Trusted Publishing OIDC
    environment:
      name: pypi
      url: https://pypi.org/project/uniprot-mcp-server/
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: release-artifacts
          path: .
      - name: Publish to PyPI (Trusted Publishing, OIDC)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          packages-dir: dist
          print-hash: true

  sign-and-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create GitHub Release
      id-token: write       # Sigstore signing OIDC
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: release-artifacts
          path: .
      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@5b79a39c381910c090341a2c9b0bf022c8b387e1  # v3.4.0
        with:
          inputs: |
            dist/*.tar.gz
            dist/*.whl
      # On the release-please dispatch path (workflow_dispatch with a tag),
      # release-please has ALREADY created the GitHub Release and owns its
      # curated, conventional-commit changelog body. We therefore target that
      # existing release by tag and DO NOT regenerate notes — we only attach
      # the build artifacts, SBOM, and Sigstore bundles to it. On the
      # push-tag fallback (no inputs.tag), no release exists yet, so we create
      # one with auto-generated notes as before.
      - name: Attach artifacts to release-please release (dispatch path)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          tag_name: ${{ inputs.tag }}
          generate_release_notes: false
          files: |
            dist/*
            sbom.cdx.json
            *.sigstore.json
      - name: Create GitHub Release (push-tag fallback path)
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          generate_release_notes: true
          files: |
            dist/*
            sbom.cdx.json
            *.sigstore.json

  publish-mcp-registry:
    # Publish server.json to the official MCP Registry
    # (registry.modelcontextprotocol.io) so the public listing tracks every
    # release automatically — closing the last manual link in the chain.
    #
    # Ordering: runs AFTER publish-pypi because the registry's
    # package-ownership check reads the just-published PyPI release. Ownership
    # is proven two ways, no secret/PAT required:
    #   - package: the ``mcp-name: io.github.smaniches/uniprot-mcp`` marker in
    #     README.md (which is the PyPI long description).
    #   - namespace ``io.github.smaniches``: GitHub OIDC (id-token below).
    # server.json already carries the released version (release-please bumps
    # it via extra-files), so no version rewrite step is needed.
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # GitHub OIDC -> MCP Registry (io.github.* namespace)
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Install mcp-publisher
        # Intentionally tracks ``latest`` rather than a SHA/version pin. The
        # MCP Registry is in preview and rotates its OIDC audience between
        # deployments; an older binary fails with "invalid audience", and the
        # official GitHub Actions guide instructs re-installing latest for
        # exactly this reason. Fetched over HTTPS from the official
        # modelcontextprotocol/registry releases.
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish server.json to MCP Registry
        run: ./mcp-publisher publish

  # Chain release verification AFTER publish + signing have completed, so
  # release-verify reads PyPI / GitHub Release assets / Sigstore bundles
  # that actually exist. This replaces the previous parallel dispatch from
  # release-please.yml, which could race the build and open false
  # `release-drift` failures before the assets were attached.
  #
  # This also covers the push-tag fallback path: a release created by
  # release.yml under GITHUB_TOKEN does not fan out to release-verify's
  # native `release: published` trigger, so without this explicit dispatch
  # the fallback path would never be verified.
  dispatch-verify:
    needs: [publish-pypi, sign-and-release]
    runs-on: ubuntu-latest
    permissions:
      actions: write        # gh workflow run (workflow_dispatch)
    steps:
      - name: Dispatch release verification
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # On the dispatch path inputs.tag is the released tag; on the
          # push-tag fallback inputs.tag is empty and github.ref_name is
          # the tag. release-verify's `tag` input is required, so this must
          # always resolve to a non-empty value.
          VERIFY_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          gh workflow run release-verify.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$VERIFY_TAG" \
            --field tag="$VERIFY_TAG"
