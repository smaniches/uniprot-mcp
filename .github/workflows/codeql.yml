name: CodeQL

# Public-repo only. Code Scanning is a paid feature on private personal
# repositories; the workflow file ships in the codebase so that the
# flip from private to public requires no additional commits.
# Removed in commit 1401845 (private-repo billing); restored in this
# commit (closing PENDING_V1.md §1.3).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 04:30 UTC — picks up new CVEs in dependencies that
    # changed via Dependabot during the prior week.
    - cron: "30 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        with:
          languages: ${{ matrix.language }}
          # Default queries plus security-extended for additional rules
          # tuned to match Anthropic Connectors Directory + OpenSSF
          # Scorecard expectations.
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        with:
          category: "/language:${{ matrix.language }}"
