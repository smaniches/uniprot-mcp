name: Release Drafter

on:
  push:
    branches: [main]
  # Note: no `pull_request:` trigger. release-drafter v7 sends
  # `targetCommitish: refs/pull/N/merge` to the GitHub update-release
  # API on PR-triggered runs, which GitHub rejects as
  # `invalid target_commitish`. Dropping the PR trigger keeps the
  # main-branch draft path (the only one that actually shipped
  # releases) and removes the spurious red check on every PR.
  # The draft is updated on the merge commit's push to main, which
  # is the canonical source of truth for the next-release notes.

permissions:
  contents: read

jobs:
  update_release_draft:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@eada3c96a64734dd381cfbda23511034e328ddb0  # v7.6.0
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
