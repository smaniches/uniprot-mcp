name: Integration (live UniProt)

on:
  schedule:
    # Nightly at 05:30 UTC — catches UniProt schema drift early.
    - cron: "30 5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run live integration tests
        id: live
        run: pytest --integration tests/integration -v
      - name: Open an issue on failure
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            const title = `Nightly integration failed on ${new Date().toISOString().slice(0,10)}`;
            const body = `The live UniProt integration suite failed. This often means UniProt changed its response shape. See run ${context.runId}.`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: "integration-drift", state: "open",
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ["integration-drift"],
              });
            }
