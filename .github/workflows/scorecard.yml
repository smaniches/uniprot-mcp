name: OpenSSF Scorecard

# Public-repo only — Scorecard's GitHub Actions integration requires
# public visibility to read repository metadata. Ships in the codebase
# so the flip from private to public requires no additional commits.
# Removed in commit 1401845 (private-repo billing); restored in this
# commit (closing PENDING_V1.md §1.4).

on:
  branch_protection_rule:
  schedule:
    - cron: "30 5 * * 1"  # Weekly Monday 05:30 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # required for SARIF upload to Code Scanning
      id-token: write          # required to publish to scorecard's Public API
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Public results: the badge on the README, plus Scorecard's
          # public-API ranking. Required for the OpenSSF Best Practices
          # gold tier.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to Code Scanning
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v3
        with:
          sarif_file: results.sarif
