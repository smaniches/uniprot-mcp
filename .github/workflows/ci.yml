name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev deps
        # Non-editable install on purpose: pip-audit (below) cannot
        # audit editable installs (it errors with "distribution marked
        # as editable"). For CI we don't need the working-tree
        # symlink anyway — every step reads from src/ via the
        # installed package metadata. Local dev keeps `-e` via
        # `pip install -e ".[test,dev]"`.
        #
        # `-c constraints/dev.lock` pins the dev/CI toolchain so this
        # quality gate is reproducible run-to-run. The pin applies only
        # to this job — the test matrix below intentionally installs on
        # floors to keep exercising the supported dependency ranges.
        # Regenerate the lock with the command in its header.
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints/dev.lock ".[test,dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy
        run: mypy src/uniprot_mcp
      - name: Docstring coverage (interrogate)
        run: interrogate -c pyproject.toml src/uniprot_mcp
      - name: Bandit (security lint)
        run: bandit -r src/uniprot_mcp
      - name: pip-audit (CVE scan)
        # CVE-2026-3219 is a vulnerability in `pip` itself, with no
        # fix version published yet. `pip` is a bootstrap toolchain
        # component on the runner, not a runtime dependency of
        # `uniprot-mcp-server` (it isn't installed into a user's env
        # by `pip install uniprot-mcp-server`). When pip ships a
        # fixed version, remove this ignore. Tracked in CHANGELOG
        # under v1.1.0 known-issues.
        #
        # Exclude `uniprot-mcp-server` from the audit. On a release
        # commit the bumped version doesn't exist on PyPI yet — the
        # release.yml workflow uploads it shortly after the tag push,
        # not on the branch push that triggers this CI run — and
        # `pip-audit --strict` treats the PyPI lookup failure as an
        # error. The project's own source is already covered by
        # ruff / mypy / bandit above; pip-audit's role here is to
        # flag CVEs in third-party dependencies.
        run: |
          pip freeze --exclude uniprot-mcp-server > /tmp/audit-deps.txt
          pip-audit --strict --ignore-vuln CVE-2026-3219 -r /tmp/audit-deps.txt

  test:
    name: Tests (${{ matrix.os }} · Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run offline test suite
        run: pytest tests/unit tests/property tests/client tests/contract -v --cov --cov-report=xml
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.12'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lock:
    name: Dev lock in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Verify constraints/dev.lock is in sync with pyproject.toml
        # uv reuses the committed pins as preferences, so recompiling only
        # changes the file when pyproject's test/dev deps changed without a
        # lock refresh. uv is pinned so the output is byte-stable across
        # runners; bump it together with the lock. The compile command must
        # match the one recorded in the lock's header.
        run: |
          python -m pip install --upgrade pip
          pip install uv==0.11.20
          uv pip compile pyproject.toml --extra test --extra dev --universal --no-emit-package pip --output-file constraints/dev.lock
          git diff --exit-code constraints/dev.lock
