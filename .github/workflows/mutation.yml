name: Mutation testing

# Mutmut runs the offline test suite against systematically-mutated
# copies of the source. A "killed" mutant is one whose mutation breaks
# the suite (i.e. the suite caught the bug); a "survived" mutant
# slipped through, indicating an under-tested code path.
#
# Strategy: matrix per src/ file. Each job mutates exactly one module
# and uses `--use-coverage` so each mutant only re-runs the tests that
# exercise the mutated line. This keeps even the largest modules
# (formatters.py, server.py) inside the 90-minute Actions window, and
# gives us per-module kill rates that surface which areas need
# uplift work.
#
# Linux-only: mutmut 3.x does not support Windows; we pin to mutmut
# 2.x which has a stable CLI but is also Linux-only in CI. Local
# development on Windows uses WSL.
#
# Public repo: GitHub-hosted runners are free, so the matrix is
# unconstrained. Schedule: weekly + on-demand.

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutmut:
    name: mutmut · ${{ matrix.module }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        # One job per src/ file. The module name (column 2) is what
        # appears in the per-module results table.
        include:
          - path: src/uniprot_mcp/__init__.py
            module: __init__
          - path: src/uniprot_mcp/proteinchem.py
            module: proteinchem
          - path: src/uniprot_mcp/cache.py
            module: cache
          - path: src/uniprot_mcp/client.py
            module: client
          - path: src/uniprot_mcp/formatters.py
            module: formatters
          - path: src/uniprot_mcp/server.py
            module: server
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        # Editable install: mutmut needs the source paths in sys.path
        # for coverage filtering (`--use-coverage`) to map mutated
        # files back to recorded test executions.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,dev]"
          pip install "mutmut>=2.5,<3.0"
      - name: Generate coverage data
        # mutmut --use-coverage reads .coverage to skip mutants in
        # lines that no test executes. We use --cov=src/uniprot_mcp so
        # the recorded paths match what mutmut sees in --paths-to-mutate.
        run: |
          pytest tests/unit tests/property tests/client tests/contract \
            --cov=src/uniprot_mcp --cov-report= -q
      - name: Run mutmut on ${{ matrix.module }}
        # Default runner: `python -m pytest -x` from the project's
        # pyproject.toml addopts. We set the test scope via
        # MUTMUT_TESTS_DIR rather than --runner so mutmut handles the
        # quoting / argv wrapping correctly. `|| true` because mutmut
        # exits non-zero on any survived mutant.
        run: |
          mutmut run \
            --paths-to-mutate=${{ matrix.path }} \
            --use-coverage \
            --tests-dir=tests/unit \
            --simple-output \
            || true
      - name: Capture results
        run: |
          mutmut results | tee mutmut-results.txt
      - name: Compute kill rate
        id: score
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess

          out = subprocess.check_output(["mutmut", "results"], text=True)

          def count(label: str) -> int:
              # mutmut 2.x: "Survived 🙁 (N)" or "Killed 🎉 (N)"
              m = re.search(rf"{label}[^\(]*\((\d+)\)", out, flags=re.I)
              return int(m.group(1)) if m else 0

          killed = count("Killed")
          survived = count("Survived")
          timeout = count("Timeout")
          suspicious = count("Suspicious")
          skipped = count("Skipped")
          total = killed + survived + timeout + suspicious

          rate = (killed / total) if total else 0.0
          print(f"killed={killed} survived={survived} timeout={timeout} "
                f"suspicious={suspicious} skipped={skipped} "
                f"total={total} rate={rate:.4f}")

          # Surface counts to the workflow output for the aggregation
          # job to consolidate.
          out_path = os.environ.get("GITHUB_OUTPUT", "")
          if out_path:
              with open(out_path, "a", encoding="utf-8") as fh:
                  fh.write(f"killed={killed}\n")
                  fh.write(f"survived={survived}\n")
                  fh.write(f"timeout={timeout}\n")
                  fh.write(f"suspicious={suspicious}\n")
                  fh.write(f"skipped={skipped}\n")
                  fh.write(f"total={total}\n")
                  fh.write(f"rate={rate:.4f}\n")
          PY
      - name: Save per-module summary
        run: |
          mkdir -p mutation-summary
          {
            echo "module: ${{ matrix.module }}"
            echo "path: ${{ matrix.path }}"
            echo "killed: ${{ steps.score.outputs.killed }}"
            echo "survived: ${{ steps.score.outputs.survived }}"
            echo "timeout: ${{ steps.score.outputs.timeout }}"
            echo "suspicious: ${{ steps.score.outputs.suspicious }}"
            echo "skipped: ${{ steps.score.outputs.skipped }}"
            echo "total: ${{ steps.score.outputs.total }}"
            echo "rate: ${{ steps.score.outputs.rate }}"
          } > "mutation-summary/${{ matrix.module }}.yaml"
      - name: Upload module results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: mutmut-${{ matrix.module }}
          path: |
            mutmut-results.txt
            mutation-summary/${{ matrix.module }}.yaml
          if-no-files-found: warn

  aggregate:
    # Consolidate per-module summaries into a single table that lands
    # as a workflow artefact. The user can copy the table into
    # docs/MUTATION_SCORES.md after each run.
    name: aggregate per-module scores
    needs: mutmut
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts
          pattern: mutmut-*
      - name: Aggregate
        run: |
          python - <<'PY'
          import pathlib
          rows = []
          for summary in sorted(pathlib.Path("artifacts").rglob("*.yaml")):
              parsed = {}
              for line in summary.read_text(encoding="utf-8").splitlines():
                  if ":" in line:
                      k, v = line.split(":", 1)
                      parsed[k.strip()] = v.strip()
              rows.append(parsed)

          if not rows:
              print("No per-module summaries collected.")
              raise SystemExit(0)

          total_k = sum(int(r.get("killed", 0)) for r in rows)
          total_s = sum(int(r.get("survived", 0)) for r in rows)
          total_t = sum(int(r.get("timeout", 0)) for r in rows)
          total_x = sum(int(r.get("suspicious", 0)) for r in rows)
          total_skip = sum(int(r.get("skipped", 0)) for r in rows)
          total_relevant = total_k + total_s + total_t + total_x
          overall = (total_k / total_relevant) if total_relevant else 0.0

          print("\n## Mutation testing summary\n")
          print("| module | killed | survived | timeout | suspicious | skipped | kill rate |")
          print("|---|---|---|---|---|---|---|")
          for r in rows:
              try:
                  rate = float(r.get("rate", "0"))
              except ValueError:
                  rate = 0.0
              print(
                  f"| `{r.get('module','?')}` | "
                  f"{r.get('killed','?')} | {r.get('survived','?')} | "
                  f"{r.get('timeout','?')} | {r.get('suspicious','?')} | "
                  f"{r.get('skipped','?')} | {rate:.2%} |"
              )
          print(f"| **TOTAL** | **{total_k}** | **{total_s}** | **{total_t}** | "
                f"**{total_x}** | **{total_skip}** | **{overall:.2%}** |")
          print(f"\nGate threshold currently 0.0 (measurement-first run).")
          print(f"Aspirational threshold: 0.95 — to be enforced once baseline + uplift land.")
          # Persist for the artefact.
          pathlib.Path("MUTATION_SUMMARY.md").write_text(
              "## Mutation testing summary\n\n"
              "| module | killed | survived | timeout | suspicious | skipped | kill rate |\n"
              "|---|---|---|---|---|---|---|\n"
              + "\n".join(
                  f"| `{r.get('module','?')}` | "
                  f"{r.get('killed','?')} | {r.get('survived','?')} | "
                  f"{r.get('timeout','?')} | {r.get('suspicious','?')} | "
                  f"{r.get('skipped','?')} | {float(r.get('rate','0')):.2%} |"
                  for r in rows
              )
              + f"\n| **TOTAL** | **{total_k}** | **{total_s}** | **{total_t}** | "
              f"**{total_x}** | **{total_skip}** | **{overall:.2%}** |\n",
              encoding="utf-8",
          )
          PY
      - name: Upload consolidated table
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: mutmut-summary
          path: MUTATION_SUMMARY.md
          if-no-files-found: warn
