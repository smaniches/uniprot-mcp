name: Mutation testing

# Mutmut runs the offline test suite against systematically-mutated
# copies of the source. A "killed" mutant is one whose mutation breaks
# the suite (i.e. the suite caught the bug); a "survived" mutant
# slipped through, indicating an under-tested code path.
#
# Gate: kill rate must be >= 95% (declared in MUTATION_SCORES.md). The
# 5% buffer absorbs equivalent-mutant noise (mutations that produce
# semantically identical code, e.g. `x and y` -> `y and x` on
# commutative operations).
#
# Schedule: weekly (Monday 06:00 UTC) and on-demand. Mutmut is too
# expensive (~10x test-suite runtime) to run on every push; the
# expectation is that the contract/unit/property tests stop most
# regressions, and the weekly mutmut run catches the remainder.
#
# Linux-only: mutmut 3.x does not support Windows
# (https://github.com/boxed/mutmut/issues/397). Local development on
# Windows uses WSL or defers to this workflow.

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutmut:
    name: mutmut (paths-to-mutate=src/uniprot_mcp)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,dev]"
          pip install mutmut
      - name: Run mutmut
        # mutmut 3.x exits non-zero when any mutant survives; we want
        # the workflow to continue so the gate check below can produce
        # a clean assertion failure with parsed numbers.
        run: |
          mutmut run --paths-to-mutate=src/uniprot_mcp --no-progress || true
      - name: Show results
        run: mutmut results | tee mutmut-results.txt
      - name: Upload mutmut results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: mutmut-results
          path: mutmut-results.txt
          if-no-files-found: warn
      - name: Compute kill rate (no gate yet — measurement-first run)
        # mutmut 3.x prints a summary like "killed: N, survived: M,
        # skipped: K" and a per-mutant listing. We extract the summary
        # robustly. The first run on v1.1.0 records the baseline;
        # the gate is raised to 95% in a follow-up PR once the baseline
        # plus targeted uplift work establishes the actual achievable
        # number.
        run: |
          python - <<'PY'
          import re
          import subprocess
          import sys

          out = subprocess.check_output(["mutmut", "results"], text=True)
          print(out)

          killed = survived = skipped = 0
          for line in out.splitlines():
              for kw, var in (
                  ("killed", "killed"),
                  ("survived", "survived"),
                  ("skipped", "skipped"),
              ):
                  m = re.match(rf"^\s*{kw}\s*:\s*(\d+)", line, flags=re.I)
                  if m:
                      locals_dict = {"killed": killed, "survived": survived, "skipped": skipped}
                      locals_dict[var] = int(m.group(1))
                      killed, survived, skipped = (
                          locals_dict["killed"], locals_dict["survived"], locals_dict["skipped"]
                      )

          if killed == 0 and survived == 0:
              # Fallback: count per-mutant status keywords.
              killed = sum(1 for ln in out.splitlines() if re.search(r"\bkilled\b", ln, flags=re.I))
              survived = sum(1 for ln in out.splitlines() if re.search(r"\bsurvived\b", ln, flags=re.I))

          total = killed + survived
          if total == 0:
              print("WARNING: no mutants reported; mutmut may have failed silently.")
              sys.exit(1)
          kill_rate = killed / total
          print(f"killed={killed}, survived={survived}, skipped={skipped}, "
                f"total_relevant={total}, kill_rate={kill_rate:.4f}")
          print("Gate threshold currently 0.0 (measurement-first run).")
          print("Aspirational threshold: 0.95 — to be enforced once baseline + uplift land.")
          PY
