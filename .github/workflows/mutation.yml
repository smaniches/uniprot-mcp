name: Mutation testing

# Mutmut runs the offline test suite against systematically-mutated
# copies of the source. A "killed" mutant is one whose mutation breaks
# the suite (i.e. the suite caught the bug); a "survived" mutant
# slipped through, indicating an under-tested code path.
#
# Strategy: matrix per src/ file with **per-test-file scoping**.
# Each job mutates exactly one module and runs only the test files
# that import that module. Combined with `--use-coverage` (skip
# mutants in lines no test exercises), this drops per-mutant cost
# by ~10-20× vs running the full unit suite per mutant, and brings
# even the largest modules (formatters.py, server.py) inside the
# Actions wall-time budget.
#
# Coverage is generated once from the FULL offline suite so we
# identify every covered mutant; the per-mutant runner is then
# scoped per-module. This gives an accurate kill-rate measurement
# (a mutant that no scoped test can kill is a real survivor that
# motivates more targeted tests) without the 90-min timeout that
# blocked the v1.1.0 baseline run on larger modules.
#
# Linux-only: mutmut 3.x does not support Windows; we pin to mutmut
# 2.x which has a stable CLI but is also Linux-only in CI. Local
# development on Windows uses WSL.
#
# Public repo: GitHub-hosted runners are free, so the matrix is
# unconstrained. Schedule: weekly + on-demand.

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutmut:
    name: mutmut · ${{ matrix.module }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        # One job per src/ file. The `tests` field lists the test
        # files (or directories) that import this module — these are
        # the files mutmut will run per mutant. Discovered by grepping
        # `from uniprot_mcp.<module> import` across tests/unit/ and
        # tests/property/.
        #
        # Timeout per matrix entry: small modules need ~10-15 min;
        # the two large modules (formatters, server) get 180 min as
        # cushion. GitHub-hosted runners on a public repo are free.
        include:
          - path: src/uniprot_mcp/__init__.py
            module: __init__
            tests: tests/unit/test_self_test.py
            timeout: 30
          - path: src/uniprot_mcp/proteinchem.py
            module: proteinchem
            tests: tests/unit/test_round_one_clinical.py tests/unit/test_proteinchem_mutation_killers.py
            timeout: 60
          - path: src/uniprot_mcp/cache.py
            module: cache
            tests: tests/unit/test_cache.py tests/unit/test_cache_mutation_killers.py
            timeout: 60
          - path: src/uniprot_mcp/client.py
            module: client
            # Full tests/unit scope (not the narrow 14-file list): client.py
            # is reached indirectly by server.py + many tool tests, so
            # restricting to "files that import client directly" loses real
            # kill signal that v1.1.0's full-suite-per-mutant baseline
            # captured. The killer file (test_client_mutation_killers.py)
            # lives inside tests/unit so the directory pickup includes it.
            tests: tests/unit tests/property
            timeout: 240
          - path: src/uniprot_mcp/formatters.py
            module: formatters
            tests: tests/unit/test_formatters.py tests/unit/test_formatter_snapshots.py tests/unit/test_keyword_subcellular.py tests/unit/test_provenance.py tests/unit/test_round_two_alphafold_publications.py tests/unit/test_biomedical_features.py tests/unit/test_empty_set_advisories.py tests/unit/test_uniref.py tests/unit/test_coverage_gaps.py
            timeout: 180
          - path: src/uniprot_mcp/server.py
            module: server
            tests: tests/unit
            timeout: 180
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        # Editable install: mutmut needs the source paths in sys.path
        # for coverage filtering (`--use-coverage`) to map mutated
        # files back to recorded test executions.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,dev]"
          pip install "mutmut>=2.5,<3.0"
      - name: Generate coverage data
        # mutmut --use-coverage reads .coverage to skip mutants in
        # lines that no test executes. We use --cov=src/uniprot_mcp so
        # the recorded paths match what mutmut sees in --paths-to-mutate.
        run: |
          pytest tests/unit tests/property tests/client tests/contract \
            --cov=src/uniprot_mcp --cov-report= -q
      - name: Run mutmut on ${{ matrix.module }}
        # Per-test-file scoping: the `--runner` value is the exact
        # pytest invocation mutmut runs per mutant. By limiting the
        # test paths to ${{ matrix.tests }} (the test files that
        # import this module), per-mutant cost drops by ~10-20× vs
        # running the full tests/unit/. pytest still picks up the
        # `addopts` from pyproject.toml automatically (--strict-markers,
        # --disable-socket, etc.).
        #
        # We capture combined stdout+stderr to mutmut-run.log and
        # parse it in the next step. mutmut 2.x's `mutmut results`
        # command only emits a "Survived (N)" section (it omits the
        # "Killed" count from its summary), so parsing `results`
        # under-reports kill rate as 0. The progress log emitted
        # during the run carries the full counts.
        # mutmut exits non-zero on any survivor; the GitHub Actions bash
        # invocation runs with `bash -e` so we explicitly mask that with
        # `|| true` on the pipeline (set -o pipefail propagates mutmut's
        # exit through tee). All subsequent steps use `if: always()` so
        # they harvest the run log even when mutmut's exit code is non-zero.
        run: |
          set -o pipefail
          mutmut run \
            --paths-to-mutate=${{ matrix.path }} \
            --use-coverage \
            --tests-dir=tests/unit \
            --runner='python -m pytest -x --tb=no -q --no-header ${{ matrix.tests }}' \
            --simple-output \
            2>&1 | tee mutmut-run.log || true
      - name: Capture results
        if: always()
        run: |
          mutmut results | tee mutmut-results.txt || true
      - name: Compute kill rate
        if: always()
        # Parses the final progress line emitted by mutmut --simple-output:
        #   "N/M  KILLED a  TIMEOUT b  SUSPICIOUS c  SURVIVED d  SKIPPED e"
        # (the spinner glyph at the start is non-ASCII and is allowed by
        # the leading `.*?` in the regex). The LAST such line is the
        # final state. If no progress lines appear (e.g. __init__ has
        # 0 mutants), all counts default to 0.
        id: score
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          log = pathlib.Path("mutmut-run.log")
          text = log.read_text(encoding="utf-8", errors="replace") if log.exists() else ""

          pat = re.compile(
              r"(\d+)/(\d+)\s+KILLED\s+(\d+)\s+TIMEOUT\s+(\d+)\s+"
              r"SUSPICIOUS\s+(\d+)\s+SURVIVED\s+(\d+)\s+SKIPPED\s+(\d+)"
          )
          matches = pat.findall(text)
          if matches:
              done, total, killed, timeout, suspicious, survived, skipped = map(
                  int, matches[-1]
              )
          else:
              done = total = killed = timeout = suspicious = survived = skipped = 0

          # mutmut counts TIMEOUT and SUSPICIOUS as effectively-killed for
          # rate purposes (they did break the test suite, just not via a
          # clean fail signal). Survived is the only "the suite missed it"
          # bucket. We report kill rate against KILLED+TIMEOUT+SUSPICIOUS
          # over total mutants attempted (excluding SKIPPED, which were
          # filtered out before running).
          attempted = killed + timeout + suspicious + survived
          effective_killed = killed + timeout + suspicious
          rate = (effective_killed / attempted) if attempted else 0.0

          print(
              f"killed={killed} survived={survived} timeout={timeout} "
              f"suspicious={suspicious} skipped={skipped} "
              f"attempted={attempted} rate={rate:.4f}"
          )

          out_path = os.environ.get("GITHUB_OUTPUT", "")
          if out_path:
              with open(out_path, "a", encoding="utf-8") as fh:
                  fh.write(f"killed={killed}\n")
                  fh.write(f"survived={survived}\n")
                  fh.write(f"timeout={timeout}\n")
                  fh.write(f"suspicious={suspicious}\n")
                  fh.write(f"skipped={skipped}\n")
                  fh.write(f"total={attempted}\n")
                  fh.write(f"rate={rate:.4f}\n")
          PY
      - name: Save per-module summary
        if: always()
        run: |
          mkdir -p mutation-summary
          {
            echo "module: ${{ matrix.module }}"
            echo "path: ${{ matrix.path }}"
            echo "killed: ${{ steps.score.outputs.killed }}"
            echo "survived: ${{ steps.score.outputs.survived }}"
            echo "timeout: ${{ steps.score.outputs.timeout }}"
            echo "suspicious: ${{ steps.score.outputs.suspicious }}"
            echo "skipped: ${{ steps.score.outputs.skipped }}"
            echo "total: ${{ steps.score.outputs.total }}"
            echo "rate: ${{ steps.score.outputs.rate }}"
          } > "mutation-summary/${{ matrix.module }}.yaml"
      - name: Upload module results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: mutmut-${{ matrix.module }}
          path: |
            mutmut-results.txt
            mutmut-run.log
            mutation-summary/${{ matrix.module }}.yaml
          if-no-files-found: warn

  aggregate:
    # Consolidate per-module summaries into a single table that lands
    # as a workflow artefact. The user can copy the table into
    # docs/MUTATION_SCORES.md after each run.
    name: aggregate per-module scores
    needs: mutmut
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts
          pattern: mutmut-*
      - name: Aggregate
        run: |
          python - <<'PY'
          import pathlib
          rows = []
          for summary in sorted(pathlib.Path("artifacts").rglob("*.yaml")):
              parsed = {}
              for line in summary.read_text(encoding="utf-8").splitlines():
                  if ":" in line:
                      k, v = line.split(":", 1)
                      parsed[k.strip()] = v.strip()
              rows.append(parsed)

          if not rows:
              print("No per-module summaries collected.")
              raise SystemExit(0)

          total_k = sum(int(r.get("killed", 0)) for r in rows)
          total_s = sum(int(r.get("survived", 0)) for r in rows)
          total_t = sum(int(r.get("timeout", 0)) for r in rows)
          total_x = sum(int(r.get("suspicious", 0)) for r in rows)
          total_skip = sum(int(r.get("skipped", 0)) for r in rows)
          total_relevant = total_k + total_s + total_t + total_x
          overall = (total_k / total_relevant) if total_relevant else 0.0

          print("\n## Mutation testing summary\n")
          print("| module | killed | survived | timeout | suspicious | skipped | kill rate |")
          print("|---|---|---|---|---|---|---|")
          for r in rows:
              try:
                  rate = float(r.get("rate", "0"))
              except ValueError:
                  rate = 0.0
              print(
                  f"| `{r.get('module','?')}` | "
                  f"{r.get('killed','?')} | {r.get('survived','?')} | "
                  f"{r.get('timeout','?')} | {r.get('suspicious','?')} | "
                  f"{r.get('skipped','?')} | {rate:.2%} |"
              )
          print(f"| **TOTAL** | **{total_k}** | **{total_s}** | **{total_t}** | "
                f"**{total_x}** | **{total_skip}** | **{overall:.2%}** |")
          print(f"\nGate threshold currently 0.0 (measurement-first run).")
          print(f"Aspirational threshold: 0.95 — to be enforced once baseline + uplift land.")
          # Persist for the artefact.
          pathlib.Path("MUTATION_SUMMARY.md").write_text(
              "## Mutation testing summary\n\n"
              "| module | killed | survived | timeout | suspicious | skipped | kill rate |\n"
              "|---|---|---|---|---|---|---|\n"
              + "\n".join(
                  f"| `{r.get('module','?')}` | "
                  f"{r.get('killed','?')} | {r.get('survived','?')} | "
                  f"{r.get('timeout','?')} | {r.get('suspicious','?')} | "
                  f"{r.get('skipped','?')} | {float(r.get('rate','0')):.2%} |"
                  for r in rows
              )
              + f"\n| **TOTAL** | **{total_k}** | **{total_s}** | **{total_t}** | "
              f"**{total_x}** | **{total_skip}** | **{overall:.2%}** |\n",
              encoding="utf-8",
          )
          PY
      - name: Upload consolidated table
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: mutmut-summary
          path: MUTATION_SUMMARY.md
          if-no-files-found: warn
