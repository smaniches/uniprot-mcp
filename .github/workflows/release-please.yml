name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  # Needed so this workflow can dispatch release.yml after release-please
  # creates the GitHub Release. workflow_dispatch is the documented exception
  # that lets a GITHUB_TOKEN-driven workflow start a downstream workflow —
  # without it the release: published event is suppressed and PyPI never sees
  # the new version.
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # When a release is created, fan out to the workflow that builds and
      # publishes the artifacts. We use workflow_dispatch (rather than relying
      # on the native release: published trigger) because release-please runs
      # under GITHUB_TOKEN and GitHub deliberately suppresses cascade triggers
      # from GITHUB_TOKEN-authored events.
      #   docs: https://docs.github.com/en/actions/security-guides/automatic-token-authentication
      - name: Dispatch build + PyPI publish + signing
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "${{ steps.release.outputs.tag_name }}" \
            --field tag="${{ steps.release.outputs.tag_name }}"

      # release-verify.yml normally fires on `release: published`. Because
      # release-please creates the release under GITHUB_TOKEN, that native
      # event is suppressed and would never reach release-verify — silently
      # bypassing the PyPI / asset / SLSA-provenance / Zenodo verification
      # chain. Dispatch it explicitly so every release-please release is still
      # verified. release-verify has its own ~5-minute retry loops, so it
      # tolerates being started in parallel with release.yml's publish.
      - name: Dispatch release verification
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release-verify.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "${{ steps.release.outputs.tag_name }}" \
            --field tag="${{ steps.release.outputs.tag_name }}"
