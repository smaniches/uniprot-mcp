name: Dev lock maintenance

# Refreshes constraints/dev.lock (the uv-compiled CI/dev toolchain lock) to the
# newest versions allowed by pyproject.toml's ranges, then opens a single PR.
#
# Companion to .github/dependabot.yml, which is scoped to DIRECT deps: transitive
# pins (msgpack, pydantic-core, ...) advance here, as one batched recompile that
# can't desync the lock, instead of churning as one-off Dependabot PRs.
# Transitive CVEs are still patched immediately by Dependabot security updates.
#
# Security model (two jobs on purpose):
#   * `validate` recompiles with --upgrade and then INSTALLS AND RUNS the newly
#     upgraded third-party toolchain. That is untrusted code, so this job is
#     granted `contents: read` only — its token cannot push, period.
#   * `open-pr` runs only trusted code (git + gh) on the lock file produced by
#     `validate` (passed as an artifact, i.e. data, not executable), so it is the
#     only job granted write scope. No upgraded dependency ever executes with a
#     push-capable token.

on:
  schedule:
    # 1st of each month, 13:00 UTC (~09:00 America/New_York). Monthly is enough:
    # this only moves transitive pins, and anything security-critical is handled
    # out-of-band by Dependabot security updates.
    - cron: "0 13 1 * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dev-lock-maintenance
  cancel-in-progress: false

jobs:
  validate:
    name: Compile & validate refreshed lock
    runs-on: ubuntu-latest
    permissions:
      contents: read  # read-only: untrusted upgraded code runs in this job
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Recompile constraints/dev.lock with --upgrade
        # Mirrors the `lock` job in ci.yml (same uv pin, same flags) plus
        # --upgrade, which advances every pin to the newest version allowed by
        # pyproject's ranges instead of reusing the committed pins as
        # preferences. --upgrade is NOT recorded in the lock header, so the
        # output stays byte-identical to what the CI `lock` gate regenerates —
        # bump uv here together with ci.yml.
        run: |
          python -m pip install --upgrade pip
          pip install uv==0.11.20
          uv pip compile pyproject.toml --extra test --extra dev --universal --no-emit-package pip --upgrade --output-file constraints/dev.lock

      - name: Detect whether the lock changed
        id: diff
        run: |
          if git diff --quiet constraints/dev.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Lock already current — nothing to refresh."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff --stat constraints/dev.lock
          fi

      - name: Validate the refreshed toolchain
        # Same quality gate as ci.yml's `lint` job. This installs and executes
        # the upgraded toolchain, so it runs here under the read-only token.
        # Keep in sync with ci.yml `lint`.
        if: steps.diff.outputs.changed == 'true'
        run: |
          pip install -c constraints/dev.lock ".[test,dev]"
          ruff check .
          ruff format --check .
          mypy src/uniprot_mcp
          interrogate -c pyproject.toml src/uniprot_mcp
          bandit -r src/uniprot_mcp
          pip freeze --exclude uniprot-mcp-server > "${RUNNER_TEMP}/audit-deps.txt"
          pip-audit --strict --ignore-vuln CVE-2026-3219 -r "${RUNNER_TEMP}/audit-deps.txt"

      - name: Upload the refreshed lock
        if: steps.diff.outputs.changed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dev-lock
          path: constraints/dev.lock
          retention-days: 1
          if-no-files-found: error

  open-pr:
    name: Open or update the refresh PR
    needs: validate
    if: needs.validate.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write       # push the chore/dev-lock-refresh branch
      pull-requests: write  # open/update the refresh PR
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          # A PAT (if set) makes the PR trigger CI; otherwise the workflow token,
          # in which case the `validate` job is the validation of record. The
          # token is persisted so the git push below authenticates.
          token: ${{ secrets.LOCK_PR_TOKEN || github.token }}

      - name: Download the refreshed lock
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dev-lock
          path: constraints/

      - name: Open or update the refresh PR
        env:
          GH_TOKEN: ${{ secrets.LOCK_PR_TOKEN || github.token }}
        run: |
          set -euo pipefail
          BRANCH=chore/dev-lock-refresh
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add constraints/dev.lock
          if git diff --cached --quiet; then
            echo "Lock on main already carries this refresh; nothing to commit."
            exit 0
          fi
          git commit -m "chore(deps): refresh dev lock to latest compatible pins"
          # Bot-owned branch; force keeps an existing PR updated in place rather
          # than spawning a new one each month.
          git push --force origin "HEAD:refs/heads/${BRANCH}"
          if [ -n "$(gh pr list --head "$BRANCH" --state open --json number -q '.[].number')" ]; then
            echo "PR already open for $BRANCH; the force-push updated it."
            exit 0
          fi
          cat > "${RUNNER_TEMP}/pr-body.md" <<'BODY'
          Automated monthly refresh of `constraints/dev.lock` via `uv pip compile --upgrade`.

          Transitive pins are advanced to the newest versions allowed by `pyproject.toml` ranges. The refreshed toolchain passed the lint / type / docstring / security (bandit, pip-audit) gate in the read-only `validate` job before this PR was opened.

          This is the batched home for transitive-dependency updates now that Dependabot is scoped to direct deps. Review the diff, confirm checks, and merge.

          Note: if this PR shows no CI checks, it was opened with GITHUB_TOKEN, which cannot trigger workflow runs. Close and reopen it to run CI, or add a LOCK_PR_TOKEN repo secret (a fine-grained PAT with contents + pull-requests write) to have CI trigger automatically.
          BODY
          gh pr create --base main --head "$BRANCH" --draft \
            --title "chore(deps): refresh dev lock" \
            --body-file "${RUNNER_TEMP}/pr-body.md"
